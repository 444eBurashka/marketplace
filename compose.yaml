services:

  # ── B2B ────────────────────────────────────────────────────
  b2b_postgresql:
    image: postgres:16-alpine
    container_name: b2b_database
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${B2B_DB_NAME}
    volumes:
      - b2b_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${B2B_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  b2b_app:
    build: ./b2b
    container_name: b2b_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@b2b_postgresql:5432/${B2B_DB_NAME}
      SECRET_KEY: ${B2B_SECRET_KEY}
      SERVICE_KEY: ${B2B_SERVICE_KEY}
      B2C_INTERNAL_URL: ${B2C_INTERNAL_URL}
      MODERATION_INTERNAL_URL: ${MODERATION_INTERNAL_URL}
    ports:
      - "${B2B_APP_PORT}:8001"
    depends_on:
      b2b_postgresql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - marketplace

  # ── B2C ────────────────────────────────────────────────────
  b2c_postgresql:
    image: postgres:16-alpine
    container_name: b2c_database
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${B2C_DB_NAME}
    volumes:
      - b2c_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${B2C_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  b2c_app:
    build: ./b2c
    container_name: b2c_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@b2c_postgresql:5432/${B2C_DB_NAME}
      SECRET_KEY: ${B2C_SECRET_KEY}
      SERVICE_KEY: ${B2C_SERVICE_KEY}
      B2B_INTERNAL_URL: ${B2B_INTERNAL_URL}
    ports:
      - "${B2C_APP_PORT}:8002"
    depends_on:
      b2c_postgresql:
        condition: service_healthy
      b2b_app:
        condition: service_started
    restart: unless-stopped
    networks:
      - marketplace

  # ── Moderation ─────────────────────────────────────────────
  mod_postgresql:
    image: postgres:16-alpine
    container_name: mod_database
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${MOD_DB_NAME}
    volumes:
      - mod_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${MOD_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  moderation_app:
    build: ./moderation
    container_name: moderation_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@mod_postgresql:5432/${MOD_DB_NAME}
      SECRET_KEY: ${MOD_SECRET_KEY}
      B2B_INTERNAL_URL: ${B2B_INTERNAL_URL}
    ports:
      - "${MOD_APP_PORT}:8003"
    depends_on:
      mod_postgresql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - marketplace

  # ── MinIO ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - marketplace

volumes:
  b2b_postgres_data:
  b2c_postgres_data:
  mod_postgres_data:
  minio_data:

networks:
  marketplace:
    driver: bridge